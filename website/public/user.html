<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">User Profile - Boho App</title>
    <meta name="description" content="View style profile and fashion recommendations on Boho App">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 50%, #6C5B7B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .back-link {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Profile Section */
        .profile-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 120px 40px 60px;
        }

        .profile-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 4rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .username {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.2);
        }

        .profile-bio {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .primary-btn {
            background: #fff;
            color: #667eea;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: inline-block;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .secondary-btn {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            text-decoration: none;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
            display: inline-block;
        }

        .secondary-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .feature-description {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Share Section */
        .share-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 40px;
        }

        .share-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .share-link-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .share-input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }

        .copy-btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #667eea;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .copy-btn.copied {
            background: #10b981;
            color: #fff;
        }

        .social-share {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .profile-section {
                padding: 100px 20px 40px;
            }

            .share-link-container {
                flex-direction: column;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">BOHO</a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <!-- Profile Section -->
    <section class="profile-section">
        <div class="profile-container">
            <!-- Avatar -->
            <div class="profile-avatar" id="avatar">
                👤
            </div>

            <!-- Username -->
            <h1 class="username" id="username">User</h1>

            <!-- Bio -->
            <p class="profile-bio">
                Welcome to my Boho App profile! Check out my style analysis and outfit recommendations.
            </p>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="#" class="primary-btn" onclick="openStore(); return false;">
                    Download Boho App
                </a>
                <a href="#" class="secondary-btn" id="analyticsBtn" onclick="goToAnalytics(); return false;">
                    📊 View Analytics
                </a>
            </div>

            <!-- Features -->
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">👗</div>
                    <div class="feature-title">Outfit Analysis</div>
                    <div class="feature-description">AI-powered fashion insights</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">✨</div>
                    <div class="feature-title">Virtual Try-On</div>
                    <div class="feature-description">See before you buy</div>
                </div>
            </div>

            <!-- Share Section -->
            <div class="share-section">
                <h3 class="share-title">Share This Profile</h3>
                <div class="share-link-container">
                    <input type="text" class="share-input" id="shareLink" readonly>
                    <button class="copy-btn" onclick="copyLink()">Copy</button>
                </div>
                <div class="social-share">
                    <a href="#" class="social-btn" id="whatsappShare" target="_blank">
                        📱 WhatsApp
                    </a>
                    <a href="#" class="social-btn" id="twitterShare" target="_blank">
                        🐦 Twitter
                    </a>
                    <a href="#" class="social-btn" id="facebookShare" target="_blank">
                        📘 Facebook
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "REDACTED",
            authDomain: "outfit-planner-bf4d8.firebaseapp.com",
            projectId: "outfit-planner-bf4d8",
            storageBucket: "outfit-planner-bf4d8.firebasestorage.app",
            messagingSenderId: "422595851889",
            appId: "1:422595851889:web:5ab5ff94e78a9f8c893c8f",
            measurementId: "G-6Z5WTZFSGM"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Generate device fingerprint for deferred deep linking
        function getDeviceFingerprint() {
            const ua = navigator.userAgent;
            const screen = `${window.screen.width}x${window.screen.height}x${window.screen.colorDepth}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const language = navigator.language;
            const platform = navigator.platform;

            return {
                userAgent: ua,
                screenResolution: screen,
                timezone: timezone,
                language: language,
                platform: platform,
                // Simple hash for matching (not for security)
                fingerprint: btoa(`${ua}${screen}${timezone}${language}`).substr(0, 32)
            };
        }

        // Track deeplink click with device fingerprinting
        async function trackDeeplinkClick(username, buttonType) {
            try {
                const trackingId = `${username}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                const trackingRef = doc(db, 'deeplinkTracking', trackingId);

                const platform = /iPad|iPhone|iPod/.test(navigator.userAgent) ? 'ios' :
                                /Android/.test(navigator.userAgent) ? 'android' : 'web';

                const fingerprint = getDeviceFingerprint();

                await setDoc(trackingRef, {
                    trackingId,
                    referrer: username.toLowerCase().trim(),
                    clickedAt: serverTimestamp(),
                    platform,
                    converted: false,
                    userAgent: navigator.userAgent,
                    buttonType, // 'download' or 'share'
                    // Device fingerprint for deferred deep linking
                    deviceFingerprint: fingerprint.fingerprint,
                    screenResolution: fingerprint.screenResolution,
                    timezone: fingerprint.timezone,
                    language: fingerprint.language,
                    devicePlatform: fingerprint.platform
                });

                // Store trackingId in localStorage for web→store→app flow
                localStorage.setItem('boho_tracking_id', trackingId);
                localStorage.setItem('boho_referrer', username.toLowerCase().trim());
                localStorage.setItem('boho_tracking_timestamp', Date.now().toString());

                // For iOS: Try to copy tracking ID to clipboard (fallback attribution method)
                if (platform === 'ios') {
                    try {
                        // Try modern Clipboard API first (more reliable)
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(`BOHO:${trackingId}`);
                            console.log('📋 Tracking ID copied to clipboard (iOS deferred deep linking - modern API)');
                        } else {
                            // Fallback to old method for older browsers
                            const tempInput = document.createElement('input');
                            tempInput.value = `BOHO:${trackingId}`;
                            tempInput.style.position = 'fixed';
                            tempInput.style.left = '-9999px';
                            document.body.appendChild(tempInput);

                            tempInput.select();
                            tempInput.setSelectionRange(0, 99999); // For mobile
                            document.execCommand('copy');
                            document.body.removeChild(tempInput);

                            console.log('📋 Tracking ID copied to clipboard (iOS deferred deep linking - fallback)');
                        }
                    } catch (clipboardError) {
                        console.warn('Clipboard API not available:', clipboardError);
                    }
                }

                console.log('✅ Tracked deeplink click with fingerprint:', trackingId);
                return trackingId;
            } catch (error) {
                console.error('Error tracking click:', error);
                return null;
            }
        }

        // Make it global
        window.trackDeeplinkClick = trackDeeplinkClick;
        window.getDeviceFingerprint = getDeviceFingerprint;
    </script>

    <script>
        // Get username from URL
        function getUsername() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || urlParams.get('username') || 'User';
            return username;
        }

        // Initialize page
        function initializePage() {
            const username = getUsername();

            // Update username
            document.getElementById('username').textContent = '@' + username;
            document.title = '@' + username + ' - Boho App Profile';

            // Update avatar (first letter)
            const firstLetter = username.charAt(0).toUpperCase();
            document.getElementById('avatar').textContent = firstLetter;

            // Update share link
            const shareUrl = window.location.origin + '/user?user=' + encodeURIComponent(username);
            document.getElementById('shareLink').value = shareUrl;

            // Update social share links
            const encodedUrl = encodeURIComponent(shareUrl);
            const shareText = encodeURIComponent('Check out my Boho App style profile!');

            document.getElementById('whatsappShare').href = `https://wa.me/?text=${shareText}%20${encodedUrl}`;
            document.getElementById('twitterShare').href = `https://twitter.com/intent/tweet?text=${shareText}&url=${encodedUrl}`;
            document.getElementById('facebookShare').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
        }

        // Copy link to clipboard
        function copyLink() {
            const input = document.getElementById('shareLink');
            input.select();
            input.setSelectionRange(0, 99999); // For mobile

            navigator.clipboard.writeText(input.value).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Open app store with tracking
        async function openStore() {
            const username = getUsername();

            // Track the click and get tracking ID
            const trackingId = await window.trackDeeplinkClick(username, 'download');

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/.test(navigator.userAgent);

            // Update these with your actual app store links
            const IOS_STORE_URL = 'https://apps.apple.com/tr/app/boho-ai-outfit-maker-planner/id6757397554?l=tr';
            const ANDROID_STORE_URL = 'https://play.google.com/store';

            // Try multiple deeplink approaches
            // 1. Custom scheme (works if app installed)
            const customSchemeLink = `styleai://user?user=${encodeURIComponent(username)}&trackingId=${trackingId}`;

            // 2. Universal Link (works if app installed and domain verified)
            const universalLink = `https://bohoapp.online/user?user=${encodeURIComponent(username)}&trackingId=${trackingId}`;

            if (isIOS) {
                // Try Universal Link first (better for iOS), then custom scheme
                let linkTriggered = false;

                // Try Universal Link
                window.location.href = universalLink;

                // Fallback to custom scheme after 500ms
                setTimeout(() => {
                    if (!linkTriggered) {
                        window.location.href = customSchemeLink;
                    }
                }, 500);

                // Fallback to App Store after 2500ms (if app not installed)
                setTimeout(() => {
                    if (!document.hidden) {
                        window.location.href = IOS_STORE_URL;
                    }
                }, 2500);
            } else if (isAndroid) {
                // Try Universal Link first, then custom scheme
                window.location.href = universalLink;

                setTimeout(() => {
                    window.location.href = customSchemeLink;
                }, 500);

                // Fallback to Play Store
                setTimeout(() => {
                    if (!document.hidden) {
                        window.location.href = ANDROID_STORE_URL;
                    }
                }, 2500);
            } else {
                window.location.href = IOS_STORE_URL;
            }
        }

        // Go to analytics
        function goToAnalytics() {
            const username = getUsername();
            window.location.href = `/analytics?user=${encodeURIComponent(username)}`;
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
